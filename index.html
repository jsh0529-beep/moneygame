  { name:"성장 중인 새싹 투자자", emoji:"🌱", cond:()=>true, desc:"완벽하지 않아서 오히려 좋다. 돈의 언어는 틀리면서 배우는 언어니까. 다음 판이 기대되는 유형." },
];

/* ───── 상태 ───── */
let G = {};
const app = document.getElementById("app");

/* 문제은행: 나온 문제는 기기에 기록, 은행을 다 볼 때까지 중복 출제 없음 */
function loadSeen(){ try { const s = JSON.parse(localStorage.getItem("moneylang-seen")); return (s && s.t && s.c && s.q) ? s : { t:[], c:[], q:[] }; } catch(e){ return { t:[], c:[], q:[] }; } }
let seen = loadSeen();
function saveSeen(){ try { localStorage.setItem("moneylang-seen", JSON.stringify(seen)); } catch(e){} }
const BANK_TOTAL = () => TEMPTATIONS.length + CHANCES.length + QUIZZES.length;
const SEEN_TOTAL = () => seen.t.length + seen.c.length + seen.q.length;

function loadBest(){ try { return JSON.parse(localStorage.getItem("moneylang-best")) || null; } catch(e){ return null; } }
function saveBest(b){ try { localStorage.setItem("moneylang-best", JSON.stringify(b)); } catch(e){} }

let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.style.display = "none", 2400);
}

function freshPick(pool, key){
  if(seen[key].length >= pool.length) seen[key] = []; // 은행 소진 → 해당 분야 리셋
  const avail = [];
  for(let i=0;i<pool.length;i++) if(!seen[key].includes(i)) avail.push(i);
  const idx = avail[Math.floor(Math.random()*avail.length)];
  seen[key].push(idx); saveSeen();
  return pool[idx];
}
const drawEvents = () => shuffle([freshPick(TEMPTATIONS,"t"), freshPick(CHANCES,"c"), freshPick(QUIZZES,"q")]);

function coverHTML(scale, badge){
  const s = scale || 1;
  return `<a class="cover-wrap" href="${BOOK_URL}" target="_blank" rel="noopener" style="width:${190*s}px" aria-label="돈의 언어 구매하기">
    ${badge ? '<div class="buy-badge">구매하기 →</div>' : ''}
    <div class="cover" style="width:${190*s}px;padding:${22*s}px ${16*s}px">
      <div style="font-size:${11.5*s}px;font-weight:700;color:var(--navy)">국영수보다 먼저 가르쳐야 할</div>
      <div style="font-size:${34*s}px;font-weight:900;color:var(--navy);letter-spacing:-1px;margin:${6*s}px 0">돈의 언어</div>
      <div style="font-size:${9.5*s}px;color:var(--navy);opacity:.85">13살 아들에게 아버지가 전하는<br>자본주의 생존 수업</div>
      <div style="background:var(--paper);border:1px solid var(--line);border-radius:6px;margin:${14*s}px auto;width:${110*s}px;height:${120*s}px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px">
        <div style="font-size:${40*s}px">📸</div>
        <div style="font-size:${8*s}px;color:var(--mute);font-style:italic">Cute · 2026.02.05</div>
      </div>
      <div style="font-size:${10*s}px;color:var(--navy);font-weight:600">장성혁 지음</div>
    </div></a>`;
}

function bannerHTML(){
  return `<a href="${BOOK_URL}" target="_blank" rel="noopener" style="text-decoration:none;display:block;margin-top:18px">
    <div style="display:flex;align-items:center;gap:12px;background:var(--navy);border-radius:14px;padding:12px 14px;box-shadow:0 4px 14px rgba(34,53,107,.2)">
      <div style="background:var(--cream);border-radius:5px;padding:8px 6px;text-align:center;min-width:58px;flex-shrink:0">
        <div style="font-size:5.5px;font-weight:700;color:var(--navy)">국영수보다 먼저 가르쳐야 할</div>
        <div style="font-size:13px;font-weight:900;color:var(--navy);letter-spacing:-.5px;margin:2px 0">돈의 언어</div>
        <div style="font-size:11px">📸</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:800;color:var(--cream);line-height:1.4">이 게임, 공략집이 있습니다 📖</div>
        <div style="font-size:11.5px;color:#B9C3DE;margin-top:2px">아빠가 아들에게 직접 쓴 자본주의 생존 수업 《돈의 언어》</div>
      </div>
      <div style="background:var(--gold);color:var(--navy);font-size:12px;font-weight:800;padding:8px 12px;border-radius:99px;white-space:nowrap;flex-shrink:0">구매 →</div>
    </div></a>`;
}

function statusHTML(){
  return `<div class="card" style="margin-bottom:14px;padding:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
      <span class="chip">📅 ${G.week}주차 / ${WEEKS}주</span>
      <span class="chip">💵 지갑 ${fmt(G.cash)}</span>
      <span class="chip">🏦 저금 ${fmt(G.savings)}</span>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;font-size:12px;color:var(--sub);font-weight:600">
      <span>😊 행복 ${G.happy}</span><span>🧠 지혜 ${G.wisdom}</span>
      <span style="margin-left:auto;color:var(--mute)">이자: 저금액의 주 10%</span>
    </div></div>`;
}

/* ───── 화면 ───── */
function renderTitle(){
  const best = loadBest();
  app.innerHTML = `
    <div class="fadein" style="text-align:center;padding-top:24px">
      <div style="font-size:12px;letter-spacing:3px;color:var(--mute);font-weight:700">《돈의 언어》 공식 체험 게임</div>
      <h1 style="font-size:clamp(28px,7vw,36px);font-weight:900;color:var(--navy);margin:10px 0 6px;letter-spacing:-1px">용돈 생존 게임 <span class="coin">🪙</span></h1>
      <p style="font-size:14px;color:var(--sub);line-height:1.8">13살, 4주, 용돈 4만원.<br>유혹을 이기고 복리를 굴려<br><b style="color:var(--navy)">자본주의에서 살아남아라.</b></p>
      ${best ? `<div class="chip" style="margin-top:10px">🏅 나의 최고 기록 ${fmt(best.total)} · ${esc(best.typeName)}</div>` : ""}
      <div class="chip" style="margin-top:8px">📚 문제은행 ${BANK_TOTAL()}문항 · 경험한 문제 ${SEEN_TOTAL()}개</div>
    </div>
    <div class="fadein" style="margin:22px 0">${coverHTML(1,true)}</div>
    <button class="btn-navy btn-full fadein" id="start">게임 시작</button>
    <p style="font-size:11.5px;color:var(--mute);text-align:center;line-height:1.6;margin-top:10px">
      부모와 아이가 함께, 선택마다 '아빠의 한마디'로 배우는 경제 수업.<br>표지를 누르면 책 소개 페이지로 이동합니다.</p>`;
  document.getElementById("start").onclick = startGame;
}

function startGame(){
  G = { week:1, cash:ALLOWANCE, savings:0, happy:40, wisdom:10, events:drawEvents(), idx:0 };
  renderPlay();
  toast(`1주차 용돈 ${fmt(ALLOWANCE)} 지급! 4주 뒤 성적표가 나온다.`);
}

function renderPlay(){
  const ev = G.events[G.idx];
  app.innerHTML = `${statusHTML()}
    <div class="card fadein">
      <div style="font-size:12px;color:var(--gold);font-weight:800;margin-bottom:6px">이벤트 ${G.idx+1}/3 · ${esc(ev.title)}</div>
      <p style="font-size:15px;line-height:1.8">${esc(ev.scene)}</p>
    </div>
    <div id="choices">${ev.choices.map((c,i)=>`<button class="btn-line choice fadein" data-i="${i}">${esc(c.t)}</button>`).join("")}</div>
    ${bannerHTML()}`;
  document.querySelectorAll("#choices button").forEach(b=>{
    b.onclick = ()=> choose(ev.choices[+b.dataset.i]);
  });
}

function choose(c){
  const fx = c.fx || {};
  if(fx.cash) G.cash = Math.max(0, G.cash + fx.cash);
  if(fx.happy) G.happy = Math.max(0, Math.min(100, G.happy + fx.happy));
  if(fx.wisdom) G.wisdom = Math.min(100, G.wisdom + fx.wisdom);
  const last = G.idx >= G.events.length - 1;
  app.innerHTML = `${statusHTML()}
    <div class="card fadein">
      <div style="font-size:12px;color:var(--gold);font-weight:800;margin-bottom:6px">이벤트 ${G.idx+1}/3</div>
      <p style="font-size:14px;line-height:1.7;color:var(--sub)">${esc(c.t)}</p>
    </div>
    <div class="card fadein" style="margin-top:12px;background:var(--navy);border-color:var(--navy)">
      <div style="font-size:12px;color:var(--gold);font-weight:800;margin-bottom:8px">👨 아빠의 한마디</div>
      <p style="font-size:14.5px;line-height:1.9;color:var(--cream)">${esc(c.lesson)}</p>
      ${c.best ? '<div style="margin-top:10px;font-size:12px;color:var(--gold);font-weight:700">✨ 현명한 선택!</div>' : ''}
    </div>
    <button class="btn-gold btn-full" id="next" style="margin-top:12px">${last ? "주간 결산 보기" : "다음 이벤트"}</button>
    ${bannerHTML()}`;
  document.getElementById("next").onclick = ()=>{
    if(last){ weekEnd(); } else { G.idx++; renderPlay(); }
  };
}

function weekEnd(){
  const interest = Math.floor(G.savings * INTEREST);
  G.savings += interest;
  const quote = DAD_QUOTES[(G.week-1) % DAD_QUOTES.length];
  const lastWeek = G.week >= WEEKS;
  app.innerHTML = `${statusHTML()}
    <div class="card fadein" style="text-align:center">
      <div style="font-size:30px">🏦</div>
      <h2 style="font-size:20px;font-weight:900;color:var(--navy);margin:8px 0">${G.week}주차 결산</h2>
      <p style="font-size:14px;line-height:1.7;color:var(--sub)">
        ${interest>0
          ? `복리 이자 <b style="color:var(--gold)">+${fmt(interest)}</b>이 저금통에 붙었다!<br>돈이 잠든 사이에도 일하고 있었다.`
          : `이번 주 저금통은 텅. 이자도 텅.<br>복리는 넣은 사람에게만 마법을 부린다.`}
      </p>
    </div>
    <div class="card fadein" style="margin-top:12px;background:#EFE8D5">
      <div style="font-size:12px;color:var(--navy);font-weight:800;margin-bottom:6px">📖 이번 주 돈의 언어</div>
      <p style="font-size:14px;line-height:1.9;font-style:italic">"${esc(quote)}"</p>
      <a href="${BOOK_URL}" target="_blank" rel="noopener" style="font-size:12px;font-weight:700;display:inline-block;margin-top:8px">이런 이야기 100배 더 → 책에서 만나기</a>
    </div>
    <div class="card" style="margin-top:12px">
      <div style="font-size:13px;font-weight:800;color:var(--navy);margin-bottom:8px">💰 저금 관리 (지갑 <span id="cashNow">${fmt(G.cash)}</span>)</div>
      <div class="grid3">
        <button class="btn-line" id="dep5" style="padding:10px;font-size:13px">+5,000 저금</button>
        <button class="btn-line" id="depAll" style="padding:10px;font-size:13px">전액 저금</button>
        <button class="btn-line" id="wd" style="padding:10px;font-size:13px">저금통 깨기</button>
      </div>
    </div>
    <button class="btn-navy btn-full" id="nextWeek" style="margin-top:14px">
      ${lastWeek ? "최종 성적표 받기 📜" : `${G.week+1}주차 시작 (용돈 +${fmt(ALLOWANCE)})`}</button>`;

  const refresh = ()=>{ weekEndRefresh(); };
  document.getElementById("dep5").onclick = ()=>{ const a=Math.min(5000,G.cash); if(a>0){ G.cash-=a; G.savings+=a; toast(`마법 저금통에 ${fmt(a)} 입금! 매주 10% 복리가 붙는다.`); refresh(); } };
  document.getElementById("depAll").onclick = ()=>{ if(G.cash>0){ const a=G.cash; G.savings+=a; G.cash=0; toast(`마법 저금통에 ${fmt(a)} 입금! 전액 복리 열차 탑승.`); refresh(); } };
  document.getElementById("wd").onclick = ()=>{ if(G.savings>0){ G.cash+=G.savings; G.savings=0; toast("저금통을 깼다. 복리 열차에서 하차…"); refresh(); } };
  document.getElementById("nextWeek").onclick = ()=>{
    if(lastWeek){ renderEnding(); return; }
    G.week++; G.cash += ALLOWANCE; G.events = drawEvents(); G.idx = 0;
    renderPlay(); toast(`${G.week}주차 용돈 ${fmt(ALLOWANCE)} 지급!`);
  };
}
function weekEndRefresh(){
  // 상태바와 지갑 표시만 갱신
  const chips = document.querySelectorAll(".chip");
  if(chips[1]) chips[1].innerHTML = `💵 지갑 ${fmt(G.cash)}`;
  if(chips[2]) chips[2].innerHTML = `🏦 저금 ${fmt(G.savings)}`;
  const cn = document.getElementById("cashNow");
  if(cn) cn.textContent = fmt(G.cash);
}

function renderEnding(){
  const total = G.cash + G.savings;
  const s = { total, happy:G.happy, wisdom:G.wisdom };
  const type = TYPES.find(t=>t.cond(s));
  let best = loadBest();
  if(!best || total > best.total){ best = { total, typeName:type.name }; saveBest(best); }

  app.innerHTML = `
    <div class="card fadein" style="text-align:center;padding:24px;border:2px solid var(--gold)">
      <div style="font-size:12px;letter-spacing:3px;color:var(--mute);font-weight:700">4주간의 경제 성적표</div>
      <div style="font-size:52px;margin:10px 0">${type.emoji}</div>
      <h2 style="font-size:24px;font-weight:900;color:var(--navy)">${esc(type.name)}</h2>
      <p style="font-size:13.5px;line-height:1.8;color:var(--sub);margin-top:10px">${esc(type.desc)}</p>
      <div style="display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap">
        <span class="chip">💰 최종 자산 ${fmt(total)}</span>
        <span class="chip">😊 행복 ${G.happy}</span>
        <span class="chip">🧠 지혜 ${G.wisdom}</span>
      </div>
      <div style="font-size:11px;color:var(--mute);margin-top:8px">🏅 최고 기록: ${fmt(best.total)}</div>
    </div>
    <div class="grid2" style="margin-top:14px">
      <button class="btn-line" id="share" style="padding:13px">📋 결과 공유하기</button>
      <button class="btn-navy" id="retry" style="padding:13px">🔄 다시 도전</button>
    </div>
    <div class="card fadein" style="margin-top:18px;text-align:center;background:#EFE8D5">
      <p style="font-size:15px;font-weight:800;color:var(--navy);line-height:1.7">게임은 4주로 끝나지만,<br>아이의 돈 공부는 이제 시작입니다.</p>
      <p style="font-size:12.5px;color:var(--sub);margin:8px 0 16px;line-height:1.7">
        복리, 협상, 욕구와 필요, 기회비용 —<br>게임 속 '아빠의 한마디'의 원전,<br>13살 아들에게 아버지가 직접 쓴 자본주의 생존 수업.</p>
      ${coverHTML(0.9,false)}
      <a href="${BOOK_URL}" target="_blank" rel="noopener" style="text-decoration:none">
        <button class="btn-gold btn-full" style="margin-top:16px">📖 《돈의 언어》 구매하러 가기</button></a>
    </div>`;

  document.getElementById("retry").onclick = startGame;
  document.getElementById("share").onclick = ()=>{
    const t = `💰 돈의 언어 게임 결과\n나는 [${type.emoji} ${type.name}]!\n최종 자산 ${fmt(total)} · 행복 ${G.happy} · 지혜 ${G.wisdom}\n\n📖 진짜 수업은 책에서: ${BOOK_URL}`;
    const done = ()=> toast("결과가 복사됐어요! SNS에 붙여넣기 하세요.");
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(done).catch(()=>fallbackCopy(t, done));
    } else { fallbackCopy(t, done); }
  };
}
function fallbackCopy(t, done){
  try{
    const ta = document.createElement("textarea");
    ta.value = t; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta); done();
  }catch(e){ toast("복사가 안 되는 환경이에요. 화면을 캡처해주세요!"); }
}

renderTitle();
</script>
</body>
</html>
